<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thunder/Lightning</title>
<style>
:root{
  --bg:#0a0a0b; --bg2:#0e0e10; --ink:#f2f0ea; --dim:#7d7a73; --dimmer:#4a4844;
  --pill:#1b1b1e; --pillhover:#26262a; --active:#e8d26a; --activeglow:rgba(232,210,106,.22);
  --line:#1e1e21; --radius:22px;
  --serif:'Times New Roman',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;overflow:hidden;}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
a{color:inherit}
.hidden{display:none!important}

/* ---- top bar ---- */
.topbar{position:fixed;top:0;left:0;right:0;height:52px;display:flex;
  align-items:center;justify-content:space-between;padding:0 22px;z-index:60;
  pointer-events:none;}
.topbar>*{pointer-events:auto}
.brand{font-family:var(--serif);font-size:14px;letter-spacing:.02em;color:#b8b5ad;
  font-style:italic;user-select:none;position:relative;padding:6px 16px 6px 0;
  background:radial-gradient(ellipse 100% 130% at 30% 50%, rgba(10,10,11,.92) 40%, transparent 78%)}
.brandLink{font-family:var(--serif);font-size:14px;color:var(--ink);font-style:normal;cursor:pointer}
.brandLink:hover{color:var(--active)}
.navlinks{display:flex;gap:20px;align-items:center}
.navlink{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);
  transition:color .2s}
.navlink:hover,.navlink.on{color:var(--ink)}

/* ---- PLAYER ---- */
/* container fills viewport only to center the stage; it must not eat clicks meant
   for the constellation pills sitting behind it. Stage re-enables interaction. */
#player{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  padding-top:5vh;z-index:20;pointer-events:none}
/* Stage width is capped by BOTH viewport width and height. The frame is 16:9, so its
   height = width*9/16. Using a vh-based cap keeps the video from eating the vertical
   space the controls (above) and metadata (below) need on short laptop screens.
   112vh ≈ (16/9)*63vh, i.e. frame height stays ~63% of viewport height. */
.stage{position:relative;width:min(72vw,112vh,1080px);z-index:20;pointer-events:auto}
.frame{position:relative;width:100%;aspect-ratio:16/9;background:#000;
  border-radius:4px;overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,.6);}
.frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.frame .placeholder{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;color:var(--dimmer);font-size:12px;letter-spacing:.1em}
.frame .blocked{position:absolute;inset:0;display:flex;align-items:flex-end;
  justify-content:center;background-size:cover;background-position:center;text-decoration:none;
  filter:grayscale(.3)}
.frame .blocked::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 45% 30% at 50% 62%, rgba(0,0,0,.7), transparent 70%),
             linear-gradient(transparent 40%,rgba(0,0,0,.82))}
.frame .blockedInner{position:relative;text-align:center;padding-bottom:34px;z-index:1}
.frame .blockedLabel{font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--dim);margin-top:8px;text-shadow:0 1px 8px rgba(0,0,0,.9),0 0 20px rgba(0,0,0,.7)}
.frame .blockedCta{font-family:var(--serif);font-style:italic;font-size:17px;color:var(--ink);
  transition:color .2s;text-shadow:0 1px 10px rgba(0,0,0,.9),0 0 24px rgba(0,0,0,.75)}
.frame .blocked:hover .blockedCta{color:var(--active)}

.meta{margin-top:20px}
.meta .info{line-height:1.42}
.meta .line1{font-size:16px;font-weight:300;letter-spacing:.01em}
.meta .artist{font-size:16px}
.meta .song{font-size:16px;font-style:italic;font-family:var(--serif);color:var(--ink);font-weight:400}
.meta .song::before{content:'“'}
.meta .song::after{content:'”'}
.meta .sub{font-size:13px;color:var(--dim);margin-top:2px;font-weight:300}
.meta .streamable{cursor:pointer;transition:color .2s;border-bottom:1px solid transparent}
.meta .streamable:hover{color:var(--ink)}
.meta .streamable.activeStream{color:var(--active)}

/* ---- constellation ---- */
.constellation{position:fixed;inset:0;z-index:5;pointer-events:none}
.constellation .wires{position:absolute;inset:0;width:100%;height:100%;z-index:1}
/* ambient decorative starburst: faint warm rays, behind everything */
.ray{stroke:#c9a659;stroke-width:.11;vector-effect:non-scaling-stroke}
/* sunburst: even thin radial lines fanning from center — the ambient layer.
   bright, but kept thin so the thicker connectors still clearly out-read it. */
.sun{stroke:#c9a659;stroke-opacity:.9;stroke-width:.14;vector-effect:non-scaling-stroke}
/* ornamental long spokes that connect to nothing */
.spoke{stroke:#c9a659;stroke-width:.09;vector-effect:non-scaling-stroke}
/* meaningful connectors: center -> pill. brighter + clearly thicker than the sunburst
   so they read as deliberate links, like the bright border around each pill. */
.conn{stroke:var(--active);stroke-opacity:1;stroke-width:.34;vector-effect:non-scaling-stroke;
  transition:stroke-width .3s}
.conn.connTerminal{stroke:var(--active);stroke-opacity:1;stroke-width:.34}
.conn.connActive{stroke:var(--active);stroke-opacity:1;stroke-width:.5}  /* active: thickest */
.node{position:absolute;pointer-events:auto;transform:translate(-50%,-50%);z-index:2;
  transition:opacity .45s ease, transform .45s ease}
.node.anchorL{transform:translate(0,-50%)}
.node.anchorR{transform:translate(-100%,-50%)}
.node .pill{display:inline-block;padding:13px 24px;border-radius:var(--radius);
  background:var(--pill);color:var(--ink);font-size:16px;white-space:nowrap;
  transition:all .22s ease;border:1px solid transparent}
.node.tag .pill{border:1px solid var(--active);border-color:rgba(232,210,106,.55)}
.node.tag .pill:hover{background:var(--pillhover);color:#fff;border-color:var(--active);transform:scale(1.05)}
/* artist/director pills: same treatment as tags (gold border) for a consistent constellation */
.node.person .pill{background:var(--pill);color:var(--ink);border:1px solid rgba(232,210,106,.55)}
.node.person .pill:hover{border-color:var(--active);color:#fff;transform:scale(1.05)}
.node.person.active .pill{background:var(--active);color:#141208;border-color:var(--active);
  box-shadow:0 0 26px var(--activeglow)}
.node.active .pill{background:var(--active);color:#141208;border-color:var(--active);
  box-shadow:0 0 26px var(--activeglow)}
.node.terminal .pill{background:var(--bg);color:var(--dim);cursor:default;
  border:1px solid rgba(232,210,106,.32);font-style:italic;font-family:var(--serif)}
.node.control .pill{letter-spacing:.14em;text-transform:uppercase;font-size:11.5px;
  color:var(--ink);background:var(--bg);border:1px solid rgba(232,210,106,.55)}
.node.control .pill:hover{color:#fff;border-color:var(--active)}
.node.control.active .pill{color:#141208;border-color:var(--active);background:var(--active);
  box-shadow:0 0 26px var(--activeglow)}
.node.shuffle .pill{letter-spacing:.16em}

/* ---- ABOUT popup ---- */
.scrim{position:fixed;inset:0;background:rgba(4,4,5,.72);backdrop-filter:blur(3px);
  z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:440px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;
  padding:34px 34px 28px}
.card h2{font-family:var(--serif);font-weight:400;font-size:22px;margin-bottom:3px}
.card .sub{font-family:var(--serif);font-style:italic;color:var(--dim);font-size:14px;margin-bottom:20px}
.card p{font-size:13.5px;line-height:1.62;color:#cdcbc4;margin-bottom:14px}
.card .credit{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-top:20px}
.card .credit a{color:var(--active);text-decoration:none}
.card .close{position:absolute;top:0;right:0}
.card{position:relative}
.cardx{position:absolute;top:16px;right:18px;font-size:18px;color:var(--dim)}
.cardx:hover{color:var(--ink)}

/* ---- ARCHIVE ---- */
#archive{position:fixed;inset:0;overflow-y:auto;z-index:40;background:var(--bg);
  padding:70px 26px 60px}
.arcHead{max-width:1400px;margin:0 auto 26px}
.arcHead .t{font-family:var(--serif);font-size:26px}
.arcHead .st{font-family:var(--serif);font-style:italic;color:var(--dim);font-size:15px;margin-top:2px}
.arcHead .stats{font-size:11px;letter-spacing:.06em;color:var(--dim);margin-top:14px}
.arcTools{display:flex;gap:14px;align-items:center;margin-top:20px;flex-wrap:wrap}
.arcTools input{background:var(--pill);border:1px solid var(--line);border-radius:var(--radius);
  padding:9px 16px;color:var(--ink);font-size:13px;width:230px;outline:none}
.arcTools input:focus{border-color:var(--dim)}
.arcTools input::placeholder{color:var(--dimmer)}
.arcShuffle{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);
  border:1px solid var(--line);border-radius:var(--radius);padding:9px 16px;transition:all .2s}
.arcShuffle:hover{color:var(--ink);border-color:var(--dim)}
.tagbar{max-width:1400px;margin:16px auto 24px;display:flex;flex-wrap:wrap;gap:8px}
.tagbar .tg{font-size:12px;padding:6px 13px;border-radius:var(--radius);background:var(--pill);
  color:var(--dim);transition:all .18s}
.tagbar .tg:hover{color:var(--ink)}
.tagbar .tg.sel{background:var(--active);color:#141208}
.grid{max-width:1400px;margin:0 auto;columns:3;column-gap:14px}
@media(max-width:1000px){.grid{columns:2}}
.cell{break-inside:avoid;margin-bottom:12px;position:relative;border-radius:4px;
  overflow:hidden;cursor:pointer;background:var(--pill);display:block}
.cell img{width:100%;display:block;transition:transform .5s ease, filter .3s}
.cell:hover img{transform:scale(1.05);filter:brightness(.4)}
.cell .ph{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;
  color:var(--dimmer);font-size:10px;letter-spacing:.1em}
.cell .ov{position:absolute;inset:0;padding:14px;display:flex;flex-direction:column;
  justify-content:flex-end;opacity:0;transition:opacity .3s;
  background:linear-gradient(transparent,rgba(0,0,0,.5))}
.cell:hover .ov{opacity:1}
.cell .ov .a{font-size:13px}
.cell .ov .s{font-size:13px;font-style:italic;font-family:var(--serif)}
.cell .ov .d{font-size:11px;color:var(--dim);margin-top:6px}
.cell .ov .tgs{font-size:10px;color:var(--dimmer);margin-top:8px;line-height:1.5}
.empty{text-align:center;color:var(--dim);padding:60px;font-size:13px;font-style:italic;font-family:var(--serif)}

/* ---- mobile player ---- */
#mobile{position:fixed;inset:0;z-index:80;background:var(--bg);display:none;
  flex-direction:column;align-items:center;justify-content:center;padding:20px}
#mobile .mframe{width:100%;aspect-ratio:16/9;background:#000;border-radius:4px;overflow:hidden}
#mobile .mframe iframe{width:100%;height:100%;border:0}
#mobile .minfo{margin-top:20px;text-align:center;line-height:1.5}
#mobile .minfo .a{font-size:16px}
#mobile .minfo .s{font-size:16px;font-style:italic;font-family:var(--serif)}
#mobile .minfo .d{font-size:12px;color:var(--dim);margin-top:8px}
#mobile .mnav{display:flex;gap:16px;margin-top:32px}
#mobile .mnav button{border:1px solid var(--line);border-radius:var(--radius);
  padding:12px 22px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
#mobile .mnav button:active{color:var(--ink);border-color:var(--dim)}
#mobile .mbrand{position:fixed;top:20px;left:0;right:0;text-align:center;
  font-family:var(--serif);font-style:italic;font-size:13px;color:var(--dim)}
@media(max-width:720px){
  #player,#archive,.topbar{display:none!important}
  #mobile{display:flex}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><button class="brandLink" onclick="TL.goPlayer()">Thunder/Lightning</button> · a love letter to music videos</div>
  <div class="navlinks">
    <button class="navlink" id="nav-player" onclick="TL.goPlayer()">Player</button>
    <button class="navlink" id="nav-archive" onclick="TL.goArchive()">Archive</button>
    <button class="navlink" onclick="TL.about(true)">About</button>
  </div>
</div>

<div id="player">
  <div class="stage">
    <div class="frame" id="frame"><div class="placeholder">loading</div></div>
    <div class="meta">
      <div class="info" id="meta"></div>
    </div>
  </div>
</div>
<div class="constellation" id="constellation"></div>

<div id="archive" class="hidden"></div>

<div id="mobile"></div>

<div id="aboutScrim" class="scrim hidden" onclick="if(event.target===this)TL.about(false)">
  <div class="card">
    <button class="cardx" onclick="TL.about(false)">✕</button>
    <h2>Thunder/Lightning</h2>
    <div class="sub">A Love Letter to Music Videos</div>
    <p>An ever-growing collection of music videos I keep returning to. Connected as a stream of consciousness. Follow any thread.</p>
    <div class="credit"><a href="https://higafox.com" target="_blank" rel="noopener">higafox.com</a></div>
  </div>
</div>

      let pick, guard=0;
      const recent=new Set(this.history.slice(-5));
      do{ pick=IDS[Math.floor(Math.random()*IDS.length)]; guard++; }
      while((pick===this.cur||recent.has(pick))&&guard<40);
      this.play(pick); return;
    }
    const list=s.list; if(!list||!list.length){ return; }
    let i=list.indexOf(this.cur);
    // if current not in list (e.g. just switched streams), start at 0, else next w/ loop
    let next = i===-1 ? list[0] : list[(i+1)%list.length];
    this.play(next);
  },

  // clicking a stream: switch + jump immediately to next in that stream
  pickStream(type, key){
    this.setStream(type, key);
    if(type==='shuffle'){ this.advance(); return; }
    const list=this.stream.list;
    if(list){
      let i=list.indexOf(this.cur);
      let target = i===-1 ? list[0] : list[(i+1)%list.length];
      this.play(target);
    } else {
      this.advance();
    }
  },

  timeline(dir){ // -1 earlier, +1 later
    this.setStream('timeline', null);
    this.stream.dir=dir;                 // remember which arrow was used
    const list=PL.timeline; let i=list.indexOf(this.cur);
    if(i===-1)i=0;
    let ni=(i+dir+list.length)%list.length;
    this.play(list[ni]);
  },

  // ---------- playback ----------
  play(id){
    if(!V[id])return;
    if(this.cur) this.history.push(this.cur);
    if(this.history.length>50)this.history.shift();
    this.cur=id;
    this.renderVideo();
    this.renderMeta();
    this.renderConstellation();
    if(document.getElementById('mobile').offsetParent!==null) this.renderMobile();
  },

  renderVideo(){
    const v=V[this.cur];
    // waterfall: prefer YouTube (end-detection), fall back to Vimeo on error, then card
    if(v.youtubeId){ this.showYouTube(v); }
    else if(v.vimeoId){ this.showVimeo(v); }
    else { this.blockedCard(this.cur); }
  },

  showYouTube(v){
    document.getElementById('frame').innerHTML='<div id="ytmount"></div>';
    this.mountYT(v.youtubeId);
  },

  showVimeo(v){
    this.ytPlayer=null;
    document.getElementById('frame').innerHTML=
      `<iframe src="https://player.vimeo.com/video/${v.vimeoId}?autoplay=1&title=0&byline=0" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
  },

  mountYT(vid){
    const forId=this.cur;
    const build=()=>{
      // guard: video may have changed while API loaded
      if(this.cur!==forId) return;
      this.ytPlayer=new YT.Player('ytmount',{
        videoId:vid, playerVars:{autoplay:1,rel:0,modestbranding:1},
        events:{
          onStateChange:e=>{ if(e.data===YT.PlayerState.ENDED) this.advance(); },
          // 2=bad param, 5=html5 error, 100=removed, 101/150=embed disabled, 153=config error
          onError:e=>{
            if(this.cur!==forId) return;
            const v=V[forId];
            if(v.vimeoId){ this.showVimeo(v); }   // waterfall: YouTube blocked -> try Vimeo
            else { this.blockedCard(forId); }      // no Vimeo -> thumbnail card
          }
        }
      });
    };
    if(window.YT&&window.YT.Player){ build(); }
    else {
      if(!document.getElementById('ytapi')){
        const s=document.createElement('script');s.id='ytapi';s.src='https://www.youtube.com/iframe_api';
        document.head.appendChild(s);
      }
      window.onYouTubeIframeAPIReady=build;
    }
  },

  // shown when a video refuses to embed: thumbnail + watch-on-source link
  blockedCard(id){
    const v=V[id]; if(!v) return;
    this.ytPlayer=null;
    const url=`https://www.youtube.com/watch?v=${v.youtubeId}`;
    const thumb=`https://img.youtube.com/vi/${v.youtubeId}/hqdefault.jpg`;
    document.getElementById('frame').innerHTML=`
      <a class="blocked" href="${url}" target="_blank" rel="noopener" style="background-image:url('${thumb}')">
        <div class="blockedInner">
          <div class="blockedCta">Watch on YouTube ↗</div>
          <div class="blockedLabel">Embedding disabled</div>
        </div>
      </a>`;
  },

  // ---------- metadata + citation ----------
  renderMeta(){
    const v=V[this.cur], s=this.stream;
    const artistOn = (CT.artists[v.artist]||0)>1;
    const artistActive = s.type==='artist'&&s.key===v.artist;
    let dirHtml='';
    if(v.directors&&v.directors.length){
      dirHtml = v.directors.map(d=>{
        const on=(CT.directors[d]||0)>1;
        const act=s.type==='director'&&s.key===d;
        if(on) return `<span class="streamable${act?' activeStream':''}" onclick="TL.pickStream('director','${esc(d)}')">${d}</span>`;
        return `<span>${d}</span>`;
      }).join(' + ');
    }
    const dateHtml = v.dateDisplay?`<div>${v.dateDisplay}</div>`:'';
    document.getElementById('meta').innerHTML=`
      <div class="line1"><span class="artist ${artistOn?'streamable':''}${artistActive?' activeStream':''}"
        ${artistOn?`onclick="TL.pickStream('artist','${esc(v.artist)}')"`:''}>${v.artist}</span> <span class="song">${v.song}</span></div>
      <div class="sub">${dirHtml}${dateHtml}</div>`;
  },

  // ---------- constellation ----------
  renderConstellation(){
    const v=V[this.cur], s=this.stream;
    const wrap=document.getElementById('constellation');
    wrap.innerHTML='';

    // tags sorted by global popularity
    const tags=[...v.tags].sort((a,b)=>(CT.tags[b]||0)-(CT.tags[a]||0));
    const tagNodes=tags.map(t=>{
      const count=CT.tags[t]||0;
      return count>1
        ? {kind:'tag',label:t,active:s.type==='tag'&&s.key===t,fn:()=>TL.pickStream('tag',t)}
        : {kind:'terminal',label:t,active:false,fn:null};
    });

    // artist + director pills: followable when they have 2+ videos. Distinct 'person'
    // kind so they read as identity, not idea. Labels shown lowercase; the real name
    // is kept for the stream lookup (playlist keys are case-sensitive).
    const personNodes=[];
    if((CT.artists[v.artist]||0)>1){
      personNodes.push({kind:'person',label:v.artist.toLowerCase(),active:s.type==='artist'&&s.key===v.artist,
        fn:()=>TL.pickStream('artist',v.artist)});
    }
    (v.directors||[]).forEach(d=>{
      if((CT.directors[d]||0)>1){
        personNodes.push({kind:'person',label:d.toLowerCase(),active:s.type==='director'&&s.key===d,
          fn:()=>TL.pickStream('director',d)});
      }
    });

    // person pills lead (prime spots), then tags. split alternately into rails.
    const allNodes=[...personNodes, ...tagNodes];
    const left=[], right=[];
    allNodes.forEach((n,i)=>{ (i%2===0?left:right).push(n); });

    // ---- SVG layer: ambient starburst (behind) + meaningful connectors ----
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','wires');
    svg.setAttribute('preserveAspectRatio','none');
    svg.setAttribute('viewBox','0 0 100 100');
    wrap.appendChild(svg);

    const cx=50, cy=46; // video center in viewport % (block sits slightly lower now)
    const AR=(window.innerWidth||1600)/(window.innerHeight||900);
    let seed=0; for(const ch of this.cur) seed=(seed*31+ch.charCodeAt(0))>>>0;
    const rand=()=>{ seed=(seed*1103515245+12345)&0x7fffffff; return seed/0x7fffffff; };

    const addRay=(ang,inner,len,cls,op)=>{
      const x1=cx+Math.cos(ang)*inner/AR, y1=cy+Math.sin(ang)*inner;
      const x2=cx+Math.cos(ang)*len/AR,   y2=cy+Math.sin(ang)*len;
      const r=document.createElementNS('http://www.w3.org/2000/svg','line');
      r.setAttribute('x1',x1);r.setAttribute('y1',y1);
      r.setAttribute('x2',x2);r.setAttribute('y2',y2);
      r.setAttribute('class',cls); if(op!=null) r.setAttribute('opacity',op.toFixed(2));
      svg.appendChild(r);
    };

    // ---- sunburst: thin radial lines fanning from center (like the connectors) ----
    // 120 lines with angular jitter + varied lengths. Every line clears the video frame,
    // but lengths are biased short (squared random) so most stop soon past the frame and
    // only a few reach toward the screen edge.
    const SUN=120;
    for(let i=0;i<SUN;i++){
      const jitter=(rand()-0.5)*(Math.PI*2/SUN)*1.4;  // can slightly overlap neighbors
      const a=(i/SUN)*Math.PI*2 + jitter;
      if(Math.abs(Math.cos(a))<0.1) continue;   // skip near-vertical to avoid a stray axis line
      const inner=7;
      const r=rand()*rand();                    // squared -> weighted toward 0 (short)
      const len=72+r*60;                        // 72 (just clears frame) .. 132, mostly low
      addRay(a, inner, len, 'sun');   // opacity from CSS (.sun)
    }

    // ambient short rays (dense, faint)
    const RAYS=44;
    for(let i=0;i<RAYS;i++){
      const ang=(i/RAYS)*Math.PI*2 + (rand()-0.5)*0.35;
      if(Math.abs(Math.cos(ang))<0.12) continue;       // no near-vertical strays
      const inner=6+rand()*10, len=inner+14+rand()*36;
      addRay(ang,inner,len,'ray',0.10+rand()*0.20);
    }
    // ornamental long spokes that go nowhere (like the reference) — sparse, longer
    const SPOKES=10;
    for(let i=0;i<SPOKES;i++){
      const ang=(i/SPOKES)*Math.PI*2 + (rand()-0.5)*0.5;
      if(Math.abs(Math.cos(ang))<0.14) continue;
      const inner=8+rand()*8, len=inner+50+rand()*40;
      addRay(ang,inner,len,'spoke',0.10+rand()*0.14);
    }

    const placed=[]; // {x,y,node,anchor,cxPill,cyPill}

    // approx pill half-width in viewport % (font ~16px, padding) to find its visual center
    const halfW=(label)=>{
      const chars=label.length;
      const px=chars*9.2+48;                  // rough label width incl padding
      return (px/(window.innerWidth||1600))*100/2;
    };

    // Shuffle crown: top center, highest
    placed.push({x:50,y:11,cxPill:50,cyPill:11,node:{kind:'shuffle',label:'Shuffle',active:s.type==='shuffle',fn:()=>TL.pickStream('shuffle',null)}});

    // measure the actual frame box so controls align to its real edges (not guessed %)
    const fr=document.getElementById('frame').getBoundingClientRect();
    const vw2=window.innerWidth||1600, vh2=window.innerHeight||900;
    const frameLeft=(fr.left/vw2)*100, frameRight=(fr.right/vw2)*100;
    const frameTop=(fr.top/vh2)*100;
    const ctrlY=Math.max(9, frameTop-4);  // just above the video's top edge

    // Earlier / Later: bottom of pill meets video top; inner edge flush to frame borders
    placed.push({x:frameLeft,y:ctrlY,anchor:'L',cxPill:frameLeft+halfW('← Earlier'),cyPill:ctrlY,
      node:{kind:'control',label:'← Earlier',active:s.type==='timeline'&&s.dir===-1,fn:()=>TL.timeline(-1)}});
    placed.push({x:frameRight,y:ctrlY,anchor:'R',cxPill:frameRight-halfW('Later →'),cyPill:ctrlY,
      node:{kind:'control',label:'Later →',active:s.type==='timeline'&&s.dir===1,fn:()=>TL.timeline(1)}});

    // rails: place pills down each side. For sparse rails (1-2 pills) force a diagonal
    // angle from center (20-50deg off horizontal) so connectors never run flat at 0/180.
    const layRail=(arr, side)=>{
      const n=arr.length;
      arr.forEach((node,i)=>{
        let y;
        if(n>=3){
          // enough pills: spread across the vertical band as before
          const top=24, bottom=68;
          y=top+((bottom-top)/(n-1))*i;
        } else {
          // 1-2 pills: derive y from a chosen angle so the line reads diagonal.
          // seed the angle off the label so it's stable per video but varied.
          // 1-2 pills: random diagonal angle in 20-50deg so the line never runs flat.
          const deg=20+Math.random()*30;       // random 20..50
          // with exactly 2 pills, force them to opposite sides of center; else random
          const up = n===2 ? (i===0) : (Math.random()<0.5);
          const rad=deg*Math.PI/180;
          // horizontal distance from center to the rail (in viewport %), approx
          const dxPct=(side==='L'?42:42);
          const dyPct=dxPct*Math.tan(rad)*0.62; // 0.62 corrects for wide aspect
          y=42+(up?-dyPct:dyPct);
          y=Math.max(20,Math.min(70,y));        // keep on-screen, clear of caption
        }
        const variation=[0,3,0.8,3.4,1.6,2.4,0.4,2][(i*2+ (side==='L'?0:1))%8];
        const x= side==='L' ? 2+variation : 98-variation;
        const hw=halfW(node.label);
        const cxPill = side==='L' ? x+hw : x-hw;   // pill visual center
        placed.push({x,y,anchor:side,cxPill,cyPill:y,node});
      });
    };
    layRail(left,'L');
    layRail(right,'R');

    // connector lines from center to each pill's VISUAL CENTER.
    // followable (tag 2+, person, controls, shuffle) -> line EXTENDS past the frame,
    // like the sunburst, so the thread reads as continuing outward.
    // terminal (one-entry playlist) -> line STOPS at the pill.
    placed.forEach(p=>{
      const followable = p.node.kind==='tag' || p.node.kind==='person' || p.node.kind==='control' || p.node.kind==='shuffle';
      const tx=p.cxPill, ty=p.cyPill;
      let ex=tx, ey=ty;
      if(followable){
        const dx=tx-cx, dy=ty-cy, len=Math.hypot(dx,dy)||1;
        // extend to a radius that clears the frame: at least past the pill, and past
        // the frame edge. reach ~= pill distance + a margin, floored so short-distance
        // pills (top controls) still shoot well beyond the video.
        const reach=Math.max(len+8, 60);
        ex=cx+dx/len*reach; ey=cy+dy/len*reach;
      }
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',cx); line.setAttribute('y1',cy);
      line.setAttribute('x2',ex); line.setAttribute('y2',ey);
      let wc='conn';
      if(p.node.active) wc+=' connActive';
      else if(!followable) wc+=' connTerminal';
      line.setAttribute('class',wc);
      svg.appendChild(line);
    });

    // draw pills
    placed.forEach(p=>{
      const n=p.node;
      const el=document.createElement('div');
      let cls='node';
      if(n.kind==='tag')cls+=' tag';
      else if(n.kind==='person')cls+=' person';
      else if(n.kind==='terminal')cls+=' terminal';
      else if(n.kind==='shuffle')cls+=' control shuffle';
      else cls+=' control';
      if(n.active)cls+=' active';
      // anchor: left rail grows right, right rail grows left, crown stays centered
      if(p.anchor==='L') cls+=' anchorL';
      else if(p.anchor==='R') cls+=' anchorR';
      el.className=cls;
      el.style.left=p.x+'%'; el.style.top=p.y+'%';
      const pill=document.createElement('span');pill.className='pill';pill.textContent=n.label;
      if(n.fn)pill.onclick=n.fn;
      el.appendChild(pill);
      wrap.appendChild(el);
    });
  },

  renderMobile(){
    const v=V[this.cur];
    const m=document.getElementById('mobile');
    const embed = v.youtubeId
      ? `https://www.youtube.com/embed/${v.youtubeId}?autoplay=1&rel=0&modestbranding=1`
      : `https://player.vimeo.com/video/${v.vimeoId}?autoplay=1&title=0&byline=0`;
    m.innerHTML=`
      <div class="mbrand">Thunder/Lightning</div>
      <div class="mframe"><iframe src="${embed}" allow="autoplay;fullscreen" allowfullscreen></iframe></div>
      <div class="minfo">
        <div class="a">${v.artist}</div>
        <div class="s">${v.song}</div>
        <div class="d">${v.director||''}${v.dateDisplay?' · '+v.dateDisplay:''}</div>
      </div>
      <div class="mnav">
        <button onclick="TL.mobileNav(-1)">Prev</button>
        <button onclick="TL.mobileRand()">Shuffle</button>
        <button onclick="TL.mobileNav(1)">Next</button>
      </div>`;
  },
  mobileNav(dir){ const list=PL.timeline;let i=list.indexOf(this.cur);if(i===-1)i=0;
    this.play(list[(i+dir+list.length)%list.length]); },
  mobileRand(){ let p;do{p=IDS[Math.floor(Math.random()*IDS.length)]}while(p===this.cur); this.play(p); },

  // ---------- ARCHIVE ----------
  arcState:{search:'',tags:new Set(),shuffled:null},
  goArchive(){
    document.getElementById('player').classList.add('hidden');
    document.getElementById('archive').classList.remove('hidden');
    document.getElementById('constellation').classList.add('hidden');
    // stop playback for real: pausing isn't reliable across YouTube/Vimeo, so tear
    // down the iframe. Returning to the player reloads the current video.
    try{ if(this.ytPlayer&&this.ytPlayer.pauseVideo) this.ytPlayer.pauseVideo(); }catch(e){}
    this.ytPlayer=null;
    document.getElementById('frame').innerHTML='';
    this.setNav('archive');
    this.renderArchive();
  },
  goPlayer(skipReload){
    document.getElementById('archive').classList.add('hidden');
    document.getElementById('player').classList.remove('hidden');
    document.getElementById('constellation').classList.remove('hidden');
    this.setNav('player');
    // reload the video we left (frame was cleared on entering archive),
    // unless the caller is about to play a specific video
    if(!skipReload && this.cur && !document.getElementById('frame').querySelector('iframe,#ytmount,.blocked')){
      this.renderVideo();
    }
  },
  setNav(which){
    document.getElementById('nav-player').classList.toggle('on',which==='player');
    document.getElementById('nav-archive').classList.toggle('on',which==='archive');
  },
  renderArchive(){
    const a=document.getElementById('archive');
    const allTags=Object.keys(CT.tags).sort((x,y)=>CT.tags[y]-CT.tags[x]);
    let list = this.arcState.shuffled ? this.arcState.shuffled.slice() : PL.timeline.slice().reverse();
    // filter
    const q=this.arcState.search.toLowerCase().trim();
    const selTags=this.arcState.tags;
    list=list.filter(id=>{
      const v=V[id];
      if(selTags.size){ for(const t of selTags) if(!v.tags.includes(t))return false; }
      if(q){
        const hay=(v.artist+' '+v.song+' '+v.director+' '+v.tags.join(' ')).toLowerCase();
        if(!hay.includes(q))return false;
      }
      return true;
    });
    a.innerHTML=`
      <div class="arcHead">
        <div class="t">${META.title}</div>
        <div class="st">${META.subtitle}</div>
        <div class="stats">${META.totalVideos} videos · ${META.totalArtists} artists · ${META.totalDirectors} directors · ${META.totalTags} connections</div>
        <div class="arcTools">
          <input id="arcSearch" placeholder="Search artist, song, director, tag" value="${escAttr(this.arcState.search)}">
          <button class="arcShuffle" onclick="TL.arcShuffle()">Shuffle</button>
        </div>
        <div class="tagbar">
          <button class="tg ${selTags.size===0?'sel':''}" onclick="TL.arcClearTags()">All</button>
          ${allTags.map(t=>`<button class="tg ${selTags.has(t)?'sel':''}" onclick="TL.arcToggleTag('${escAttr(t)}')">${t}</button>`).join('')}
        </div>
      </div>
      <div class="grid">${list.length?list.map(id=>this.cell(id)).join(''):'<div class="empty">Nothing matches that thread.</div>'}</div>`;
    const si=document.getElementById('arcSearch');
    si.oninput=e=>{this.arcState.search=e.target.value; this._reflow();};
    // keep focus
    si.focus(); si.setSelectionRange(si.value.length,si.value.length);
  },
  _reflow(){ // re-render grid only-ish (simple full re-render, keep search focus handled above)
    this.renderArchive();
  },
  cell(id){
    const v=V[id];
    const thumb=v.thumbnailUrl
      ?`<img src="${v.thumbnailUrl}" loading="lazy" alt="">`
      :`<div class="ph">${v.provider.toUpperCase()}</div>`;
    return `<a class="cell" onclick="TL.fromArchive('${id}')">
      ${thumb}
      <div class="ov">
        <div class="a">${v.artist}</div>
        <div class="s">${v.song}</div>
        <div class="d">${v.director||''}${v.dateDisplay?' · '+v.dateDisplay:''}</div>
        <div class="tgs">${v.tags.join('  ·  ')}</div>
      </div></a>`;
  },
  fromArchive(id){ this.setStream('shuffle',null); this.goPlayer(true); this.play(id); },
  arcToggleTag(t){ const s=this.arcState.tags; s.has(t)?s.delete(t):s.add(t); this.renderArchive(); },
  arcClearTags(){ this.arcState.tags.clear(); this.renderArchive(); },
  arcShuffle(){ const a=PL.timeline.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} this.arcState.shuffled=a; this.renderArchive(); },

  // ---------- about + keys ----------
  about(show){ document.getElementById('aboutScrim').classList.toggle('hidden',!show); },
  keys(e){
    if(e.key==='Escape'){ this.about(false); return; }
    const onArchive=!document.getElementById('archive').classList.contains('hidden');
    if(onArchive){ if(e.key==='a'||e.key==='A')this.goPlayer(); return; }
    if(e.key==='ArrowLeft')this.timeline(-1);
    else if(e.key==='ArrowRight')this.timeline(1);
    else if(e.key==='r'||e.key==='R')this.pickStream('shuffle',null);
    else if(e.key==='a'||e.key==='A')this.goArchive();
  }
};

function esc(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function escAttr(s){return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// mobile check
if(window.matchMedia('(max-width:720px)').matches){
  TL.cur=IDS[Math.floor(Math.random()*IDS.length)];
  TL.renderMobile();
} else {
  TL.init();
}

</script>
</body>
</html>
